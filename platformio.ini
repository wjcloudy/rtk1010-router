; rtk1010-router — ESP32-S2 WiFi web router for an RTK-1010 GNSS + LoRa radio.
;
;   pio run                                 # build firmware
;   pio run -t buildfs                      # build the web-UI filesystem image (data/)
;   pio run -t upload                       # USB flash (S2 native USB; ROM download mode once)
;   pio run -e rtk1010_web_ota -t upload    # OTA flash app over WiFi (after the first USB flash)
;   pio run -e rtk1010_web_ota -t uploadfs  # OTA flash the web UI over WiFi
;
; ESP32-S2 has 2 UART controllers: GPS=UART1, LoRa=UART0 (pins are remappable and
; web-configurable). USB-CDC (Arduino `Serial`) is the host data channel — there is no
; serial console; all status lives on the web page. A raw TCP server on :10110 mirrors
; the host output without the USB-CDC DTR requirement.

[platformio]
default_envs = rtk1010_web

[env:rtk1010_web]
platform = espressif32@6.13.0
framework = arduino
board = esp32-s2-saola-1
board_build.partitions = default.csv         ; 2x ~1.2MB app (OTA A/B) + ~1.5MB SPIFFS
board_build.filesystem = spiffs              ; web assets in data/ are served from SPIFFS
monitor_speed = 115200
upload_protocol = esptool

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1               ; `Serial` = native USB CDC
    -DCORE_DEBUG_LEVEL=0

; If auto-detect picks the wrong port for the USB flash, set it explicitly:
; upload_port = COM14

; ---------------------------------------------------------------------------
; OTA over WiFi — use after the first USB flash. No COM port needed.
;   pio run -e rtk1010_web_ota -t upload      # app firmware
;   pio run -e rtk1010_web_ota -t uploadfs    # web UI (SPIFFS data/)
; Targets rtk1010.local by default. On the board's own AP, set upload_port = 192.168.4.1.
[env:rtk1010_web_ota]
extends = env:rtk1010_web
upload_protocol = espota
upload_port = rtk1010.local
; upload_port = 192.168.4.1          ; when connected to the board's own AP
; upload_flags = --auth=rtk1010ota   ; only if you set ArduinoOTA.setPassword()
