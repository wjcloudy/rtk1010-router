name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e rtk1010_web

      - name: Build web-UI filesystem image
        run: pio run -e rtk1010_web -t buildfs

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp .pio/build/rtk1010_web/firmware.bin dist/
          cp .pio/build/rtk1010_web/spiffs.bin   dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtk1010-router-firmware
          path: dist/*.bin

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.bin
          body: |
            Flash over WiFi:
            - app:  `pio run -e rtk1010_web_ota -t upload`
            - UI:   `pio run -e rtk1010_web_ota -t uploadfs`

            Or via esptool/USB: `firmware.bin` (app) and `spiffs.bin` (web UI).
